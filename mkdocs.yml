site_name: Hybrid Intelligence Lab
site_description: >-
  Среда и общая библиотека знаний для гибридных команд человек + AI.
  Публикуются разделы guides/ и research/.
site_url: https://g-ivan-a.github.io/hybrid-Intelligence-lab/
repo_url: https://github.com/G-Ivan-A/hybrid-Intelligence-lab
repo_name: G-Ivan-A/hybrid-Intelligence-lab

# Контент собран в служебном каталоге website/ через символические ссылки на
# docs/, guides/ и research/. Это держит Markdown-ссылки валидными для GitHub,
# валидатора структуры и собранного сайта без сторонних плагинов-агрегаторов.
# Область публикации — только guides/ и research/ (+ продуктовые docs/vision,
# docs/product-concept и docs/ecosystem-map). governance/ и standards/
# намеренно НЕ публикуются.
docs_dir: website

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - admonition
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details

plugins:
  - search

# Битые внутренние ссылки и пропущенные файлы должны падать в strict-сборке.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

nav:
  - Главная: index.md
  - Продукт:
    - Vision: docs/vision.md
    - Concept: docs/product-concept.md
    - Ecosystem Map: docs/ecosystem-map.md
  - Гайды:
    - Обзор: guides/README.md
    - Быстрый старт: guides/quick-start.md
    - Инициализация проекта: guides/init-spoke-repo.md
    - Синхронизация с Хабом: guides/sync-from-hub.md
    - Синхронизация с проектами: guides/sync-with-projects.md
    - Взаимодействие с ИИ: guides/interact-with-ai.md
    - Развёртывание проекта: guides/deploy-project.md
    - Откат синхронизации: guides/rollback-sync.md
    - Добавление шаблона: guides/contribute-template.md
    - Решение проблем: guides/troubleshooting.md
    - Глоссарий: guides/glossary.md
  - Исследования:
    - Обзор: research/README.md
    - Hub:
      - Обзор: research/hub/README.md
      - Контекст и bootstrap-паттерны: research/hub/2026-05-28-project-context-and-bootstrap-patterns.md
      - Аудит классификации промптов: research/hub/2026-05-28-prompts-classification-audit.md
      - Стандарт классификации промптов: research/hub/2026-05-28-prompts-classification-standard.md
      - Аудит governance-стратегии команды C: research/hub/2026-06-01-team-c-governance-strategy-audit.md
      - Анализ пользовательских промптов: research/hub/2026-05-28-user-prompts-analysis.md
      - Внешние governance-паттерны: research/hub/2026-06-02-external-governance-patterns-review.md
      - Аудит governance ecosystem: research/hub/2026-06-12-ecosystem-governance-audit.md
      - Архитектура экосистемы Hub/open-ai.ru/reputation: research/hub/2026-06-20-ecosystem-architecture-research.md
      - Внешние практики agent work: research/hub/2026-06-12-external-practice-intake.md
      - Международные AI governance practices: research/hub/2026-06-12-international-ai-governance-practices.md
      - Концепция базовых каталогов для архетипов: research/hub/2026-06-23-repository-structure-concept.md
      - Инвентаризация и классификация артефактов экосистемы: research/hub/2026-06-25-artifact-inventory-and-classification.md
      - "RFC: индустриальные нормы и варианты": research/hub/2026-06-27-rfc-industry-norms-and-variants.md
      - "ADR: индустриальные нормы и варианты": research/hub/2026-06-27-adr-industry-norms-and-variants.md
      - Ретроспектива AI-коллаборации: research/hub/2026-06-02-ai-collaboration-retrospective.md
      - Ретроспектива миграции Mango: research/hub/2026-06-02-ai-collaboration-retrospective-mango-migration.md
    - Governance:
      - Обзор: research/governance/README.md
      - Формат research-документации: research/governance/2026-06-06-research-documentation-format.md
      - Формат исполнимых контрактов: research/governance/2026-06-06-executable-contract-format.md
      - Формат документации контрактов: research/governance/2026-06-06-contract-documentation-format.md
      - Решения по структуре каталогов: research/governance/2026-06-06-governance-folder-structure-decisions.md
    - Mango:
      - Обзор: research/mango/README.md
      - Классификация продуктов: research/mango/2026-05-22-classification.md
      - Классификация ТЗ: research/mango/2026-05-22-classification-tz.md
      - Flow требований: research/mango/2026-05-22-requirements-flow.md
      - Декомпозиция возможностей: research/mango/2026-05-27-capability-decomposition.md
      - Дорожная карта RAG-маппинга: research/mango/2026-05-26-rag-mapping-roadmap.md
      - Неопределённость жизненного цикла требований: research/mango/2026-05-26-requirements-lifecycle-uncertainty.md
      - Концепция таксономии: research/mango/2026-05-26-taxonomy-concept.md
      - Требования в AI-эру (Вигерс ↔ mango): research/mango/2026-06-18-requirements-engineering-ai-era.md
      - Видение структуры репозитория: research/mango/2026-06-19-repository-structure-vision.md
      - Оптимизация потребления токенов: research/mango/2026-06-19-token-optimization-proposal.md
    - open-ai.ru:
      - Обзор: research/open-ai-ru/README.md
      - Архитектура репозитория и уровни L3-L4: research/open-ai-ru/2026-06-20-open-ai-ru-repository-architecture-and-l3-l4.md
    - Репутационные технологии:
      - Обзор: research/reputation-technologies/README.md
      - Видение фаундера и фреймворк GRA (RU): research/reputation-technologies/2026-06-20-founders-vision-and-framework.ru.md
      - Стандарт фреймворка (EN): research/reputation-technologies/2026-06-20-framework-standard.en.md
      - White paper (EN): research/reputation-technologies/2026-06-20-white-paper.en.md
      - Executive summary (RU + EN): research/reputation-technologies/2026-06-20-executive-summary.ru-en.md
      - Словарь терминов (RU↔EN): research/reputation-technologies/2026-06-20-glossary.ru-en.md
