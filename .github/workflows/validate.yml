name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate shell syntax
        run: bash -n tools/*.sh templates/htom/tools/*.sh templates/spoke/tools/*.sh

      - name: Test frontmatter validator
        run: bash tools/test-frontmatter-validator.sh

      - name: Test evidence structure validator
        run: bash tools/test-evidence-structure-validator.sh

      - name: Test smart sync
        run: bash tools/test-smart-sync.sh

      - name: Test post-migration validator invariants
        run: bash tools/test-post-migration-validator.sh

      - name: Test Sprint 5 agent-model contracts
        run: bash tools/test-sprint-5-agent-model.sh

      - name: Validate frontmatter
        run: ./tools/validate-frontmatter.sh .

      - name: Validate file naming
        run: ./tools/validate-file-naming.sh

      - name: Validate repository structure
        run: ./tools/validate-repository-structure.sh

      - name: Validate template manifest
        run: python3 tools/generate-manifest.py --check
