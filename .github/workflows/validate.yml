name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install docs dependencies
        run: pip install "mkdocs-material==9.7.6"

      - name: Validate shell syntax
        run: bash -n tools/*.sh templates/htom/tools/*.sh templates/spoke/tools/*.sh

      - name: Test frontmatter validator
        run: bash experiments/test-frontmatter-validator.sh

      - name: Validate frontmatter
        run: ./tools/validate-frontmatter.sh .

      - name: Validate file naming
        run: ./tools/validate-file-naming.sh

      - name: Validate repository structure
        run: ./tools/validate-repository-structure.sh

      - name: Validate template manifest
        run: python3 tools/generate-manifest.py --check

      - name: Validate MkDocs site
        run: ./tools/validate-mkdocs-site.sh
