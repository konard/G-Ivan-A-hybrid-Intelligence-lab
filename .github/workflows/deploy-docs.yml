name: Deploy docs to GitHub Pages

# Авто-публикация сайта MkDocs (разделы guides/ и research/) на GitHub Pages
# при изменениях в основной ветке. governance/ и standards/ не публикуются.

on:
  push:
    branches:
      - main
    paths:
      - "mkdocs.yml"
      - "website/**"
      - "docs/**"
      - "guides/**"
      - "research/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные деплои не нужны: достаточно последнего состояния main.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install "mkdocs-material==9.7.6"

      - name: Build site
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
        run: mkdocs build --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
